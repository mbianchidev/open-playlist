name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/deploy-pages.yml"
  schedule:
    # Refresh the published API spec from open-playlist-engine every 6 hours.
    - cron: "17 */6 * * *"
  workflow_dispatch:

# Allow the workflow to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping queued runs in between.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      OPENAPI_SPEC_URL: https://raw.githubusercontent.com/mbianchidev/open-playlist-engine/main/openapi/open-playlist.yaml
      # Optional for public specs; required if open-playlist-engine is private.
      OPENAPI_SPEC_TOKEN: ${{ secrets.OPEN_PLAYLIST_ENGINE_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble site
        run: |
          mkdir -p _site
          cp -r site/. _site/
          # Publish the canonical OpenAPI spec from open-playlist-engine alongside the site.
          curl_args=(--fail --location --show-error --silent --retry 3)
          if [ -n "$OPENAPI_SPEC_TOKEN" ]; then
            curl_config="$(mktemp)"
            trap 'rm -f "$curl_config"' EXIT
            chmod 600 "$curl_config"
            printf 'header = "Authorization: %s %s"\n' "Bearer" "$OPENAPI_SPEC_TOKEN" > "$curl_config"
            curl_args+=(--config "$curl_config")
          fi
          curl "${curl_args[@]}" "$OPENAPI_SPEC_URL" --output _site/open-playlist.yaml

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
